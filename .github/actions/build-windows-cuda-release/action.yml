name: 'Build Windows CUDA wheel'
description: 'Build Windows CUDA backend wheel'

runs:
  using: "composite"
  steps:
    - name: Install cuDNN headers and libraries
      shell: cmd
      run: |
        uv pip install nvidia-cudnn-cu12==9.*
        :: Find cuDNN include/lib dirs from the installed package metadata
        for /f "delims=" %%d in ('python -c "import importlib.metadata, pathlib; dist = importlib.metadata.distribution(\"nvidia-cudnn-cu12\"); root = pathlib.Path(dist._path).parent; inc = next(root.rglob(\"cudnn.h\"), None); print(inc.parent if inc else \"\")"') do set CUDNN_INCLUDE_PATH=%%d
        for /f "delims=" %%d in ('python -c "import importlib.metadata, pathlib; dist = importlib.metadata.distribution(\"nvidia-cudnn-cu12\"); root = pathlib.Path(dist._path).parent; lib = next(root.rglob(\"cudnn.lib\"), None); print(lib.parent if lib else \"\")"') do set CUDNN_LIBRARY_PATH=%%d
        >>%GITHUB_ENV% echo CUDNN_INCLUDE_PATH=%CUDNN_INCLUDE_PATH%
        >>%GITHUB_ENV% echo CUDNN_LIBRARY_PATH=%CUDNN_LIBRARY_PATH%

    - name: Build MLX with CUDA
      shell: cmd
      env:
        CMAKE_ARGS: >-
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_RC_COMPILER=rc
          -DMLX_BUILD_CUDA=ON
      run: uv pip install -e . -v

    - name: Build CUDA backend package (Stage 2)
      shell: cmd
      run: |
        uv pip install delvewheel "build<=1.4.2" setuptools
        python setup.py clean --all
        set MLX_BUILD_STAGE=2
        python -m build -w
        for /f "delims=" %%d in ('python -c "import mlx.core; import pathlib; print(pathlib.Path(mlx.core.__file__).parent)"') do set MLX_PKG_DIR=%%d
        delvewheel repair dist\mlx_cuda*.whl -w wheelhouse --add-path "%MLX_PKG_DIR%" ^
          --exclude cublas64_*.dll ^
          --exclude cublasLt64_*.dll ^
          --exclude cudart64_*.dll ^
          --exclude cudnn*.dll ^
          --exclude nvrtc64_*.dll ^
          --exclude nvJitLink_*.dll ^
          --exclude nccl*.dll
